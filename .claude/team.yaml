team: shoal
description: "Local stdio MCP server for Jira and GitHub Issues — quality alternative to official broken servers."

defaults:
  model: sonnet
  budget: 0.50
  permission-mode: dontAsk

members:
  - name: architect
    role: "Cross-cutting design decisions, provider interfaces, spec"
    owns:
      - "shoal-jira-spec.md"
      - "src/index*.ts"
      - "src/config.ts"
      - "*.md"

  - name: backend
    role: "Jira and GitHub tool implementations, API clients, MCP server wiring"
    owns:
      - "src/tools/**"
      - "src/jira/**"
      - "src/github/**"

  - name: tester
    role: "Test suite, fixtures, coverage"
    owns:
      - "src/__tests__/**"
      - "vitest.config.ts"

  - name: technical-writer
    role: "README, CHANGELOG, user-facing docs"
    owns:
      - "README.md"
      - "CHANGELOG.md"
      - "docs/**"
